[general]
default_workspace = "workspace/stable"
scratch_workspace = "workspace/scratch"

[solver]
timeout = 10000
cache_timeout = 0.01
enable_quick_out = true
quick_out_factor = 2
debug = false

[generation]
num_scrambles = 10
num_alg_solves = 5
min_constraints_per_step = 3
max_constraints_per_step = 8
target_count = 1000

[discovery]
workspace = "workspace/hillclimb"
seed_workspace = "workspace/hillclimb"
max_methods = 10000
max_seed_methods = 250
mutations_per_method = 18
mutation_strength = 3
feature_diversity_limit = 50
log_scored_candidates = true
verify_top_n = 20
verify_num_scrambles = 10

[parallel]
enabled = true

# If null → auto-detect based on memory
max_workers = 8

# Fraction of total system memory allowed (0.0–1.0)
memory_fraction = 0.35

# Fallback estimate per worker (GB)
memory_per_worker_gb = 32

# Minimum free memory buffer (GB)
safety_buffer_gb = 8
