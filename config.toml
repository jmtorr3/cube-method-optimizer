[general]
default_workspace = "workspace/stable"
scratch_workspace = "workspace/scratch"

[solver]
timeout = 10000
cache_timeout = 0.01
enable_quick_out = true
quick_out_factor = 2
debug = false

[generation]
num_scrambles = 10
num_alg_solves = 5

[parallel]
enabled = true

# If null → auto-detect based on memory
max_workers = 8

# Fraction of total system memory allowed (0.0–1.0)
memory_fraction = 0.35

# Fallback estimate per worker (GB)
memory_per_worker_gb = 32

# Minimum free memory buffer (GB)
safety_buffer_gb = 8
